<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brainyard Playground</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        background: #0b0e14;
        color: #c9d1d9;
      }
      .center {
        min-height: 100vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: .75rem;
      }
      .btn {
        background: #2563eb; color: #fff; border: 0;
        padding: .55rem 1rem; border-radius: 6px; cursor: pointer; font-size: .9rem;
      }
      .btn.primary { background: #16a34a; }
      button { background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
               padding: .35rem .7rem; border-radius: 6px; cursor: pointer; }
      button.danger { border-color: #f85149; color: #f85149; }
      header { display: flex; align-items: center; gap: .75rem; padding: .75rem 1rem;
               border-bottom: 1px solid #21262d; }
      .spacer { flex: 1; }
      .dashboard, .workspace { max-width: 980px; margin: 0 auto; padding: 1rem; }
      .workspace { max-width: none; height: 100vh; display: flex; flex-direction: column; }
      ul.sessions { list-style: none; padding: 0; }
      li.session { display: flex; align-items: center; gap: .75rem;
                   padding: .6rem .25rem; border-bottom: 1px solid #21262d; }
      li.session .id { font-family: ui-monospace, monospace; }
      li.session .actions { margin-left: auto; display: flex; gap: .4rem; }
      .status { font-size: .75rem; padding: .1rem .5rem; border-radius: 999px;
                background: #21262d; }
      .status.ready, .status.active { color: #3fb950; }
      .status.suspended, .status.idle { color: #d29922; }
      .status.provisioning { color: #58a6ff; }
      .status.failed { color: #f85149; }
      .empty { color: #8b949e; }
      iframe.term { flex: 1; min-height: 0; width: 100%; border: 0; background: #0b0e14; }
      select.ports { background: #21262d; color: #c9d1d9; border: 1px solid #30363d;
                     padding: .35rem .6rem; border-radius: 6px; cursor: pointer;
                     font-size: .85rem; font-family: ui-monospace, monospace; }
      .dashboard .toolbar { display: flex; gap: .5rem; margin-bottom: .5rem; }
      .settings { max-width: 760px; margin: 0 auto; padding: 1rem; }
      .settings section { margin-top: 1rem; }
      .settings h2 { font-size: 1rem; margin-bottom: .25rem; }
      .hint { color: #8b949e; font-size: .85rem; }
      .hint code { color: #c9d1d9; }
      .hint.ok { color: #3fb950; } .hint.err { color: #f85149; }
      .toolbar { display: flex; gap: .5rem; align-items: center; margin: .75rem 0; }
      table.env { width: 100%; border-collapse: collapse; }
      table.env td { padding: .2rem .25rem .2rem 0; }
      table.env input { background: #0d1117; color: #c9d1d9; border: 1px solid #30363d;
        border-radius: 6px; padding: .4rem .6rem;
        font-family: ui-monospace, monospace; font-size: .85rem; }
      table.env input.k { width: 240px; }
      table.env input.v { width: 100%; min-width: 280px; }
      table.env td.v-cell { display: flex; align-items: center; gap: .25rem; }
      table.env td.v-cell input.v { flex: 1 1 auto; min-width: 0; }
      button.reveal { background: transparent; border: none; cursor: pointer;
        padding: .2rem .4rem; font-size: 1rem; line-height: 1; }
      button.reveal:hover { background: #21262d; border-radius: 6px; }
      /* Provisioning progress modal */
      .modal-backdrop { position: fixed; inset: 0; z-index: 50;
        background: rgba(1,4,9,.7); display: flex;
        align-items: center; justify-content: center; }
      .modal { background: #0d1117; border: 1px solid #30363d; border-radius: 10px;
        padding: 1.5rem; width: min(420px, 90vw);
        box-shadow: 0 10px 40px rgba(0,0,0,.5); }
      .modal h2 { margin: 0 0 .25rem; font-size: 1.05rem; }
      .modal .id { font-family: ui-monospace, monospace; color: #8b949e;
        font-size: .8rem; margin: 0 0 1rem; }
      .progress { height: 8px; background: #21262d; border-radius: 999px;
        overflow: hidden; margin-bottom: .6rem; }
      .progress .bar { height: 100%; width: 0;
        background: linear-gradient(90deg, #2563eb, #16a34a);
        transition: width .6s ease; }
      .progress.err .bar { background: #f85149; transition: none; }
      /* Read-only session-config modal (per-workspace).
         Cap height to the viewport and scroll the body internally so a long
         config list can't push the header + Close button off-screen. */
      .modal.config-modal { width: min(760px, 92vw); max-height: 85vh;
        display: flex; flex-direction: column; }
      .config-modal > header { display: flex; align-items: center; gap: .5rem;
        margin-bottom: .75rem; flex: 0 0 auto; }
      .config-body { display: flex; gap: 1rem; flex: 1 1 auto;
        min-height: 0; overflow: hidden; }
      .config-sessions { display: flex; flex-direction: column; gap: .35rem;
        flex: 0 0 190px; overflow-y: auto; }
      .config-session { text-align: left; background: #161b22;
        border: 1px solid #30363d; border-radius: 6px; padding: .4rem .5rem;
        cursor: pointer; display: flex; flex-direction: column; gap: .15rem; }
      .config-session:hover { border-color: #388bfd; }
      .config-session.active { border-color: #2563eb; background: #1c2333; }
      .config-session .id { font-family: ui-monospace, monospace;
        font-size: .78rem; color: #c9d1d9; }
      .config-detail { flex: 1 1 auto; min-width: 0; overflow-y: auto;
        padding-right: .25rem; }
      .config-head { color: #8b949e; font-size: .85rem; margin: 0 0 .5rem; }
      .config-head code { color: #c9d1d9; }
      .config-modal h3 { font-size: .95rem; margin: .5rem 0 .25rem; }
      table.config-kv td { vertical-align: top; padding: .15rem .5rem .15rem 0; }
      table.config-kv td:first-child { width: 44%; white-space: normal;
        word-break: break-word; color: #8b949e; }
      table.config-kv td:last-child { word-break: break-word; }
      table.config-kv code { font-size: .8rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- The terminal is ttyd's own client, embedded via an iframe in the
         workspace view; no xterm.js is bundled or loaded here anymore. -->
    <script src="/js/main.js"></script>
  </body>
</html>
