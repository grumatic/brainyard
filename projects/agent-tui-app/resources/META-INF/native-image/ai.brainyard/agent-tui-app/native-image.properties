# GraalVM native-image config for the `by` binary.
#
# Auto-discovered by native-image because it lives under
# META-INF/native-image/<groupId>/<artifactId>/ inside the uberjar.
#
# Class-initialization policy — MODERN (post-Phase-3 / 2026-05-15)
# ----------------------------------------------------------------
# The design's §7 modern policy is now live: explicit allow-list +
# `--features=clj_easy.graal_build_time.InitClojureClasses` instead of
# the deprecated bare `--initialize-at-build-time` form.
#
# The migration was blocked for a while on three obstacles, all of
# which are now resolved:
#
#  1. (Resolved) `defagent` cross-namespace Var references in 14 of
#     18 agent definitions raced class-init order at build time. The
#     `deftool` macro at components/agent/src/.../tool.clj:136 was
#     refactored to defer the `(fn? tool-fn)` check into the wrap-fn
#     body, so the Var is dereferenced at first invocation. See
#     `docs/design/native-image-design.md` §14.
#
#  2. (Resolved) Clojure-level reflection from unhinted Java interop
#     surfaced under build-time class-init. ~200 reflection sites
#     were cleaned up across the codebase. `bb compile:ata` runs with
#     `*warn-on-reflection* true` to keep new reflection visible.
#
#  3. (Mitigated) `clojure.stacktrace` has `(set! *warn-on-reflection*
#     true)` at top level. GraalVM build-time class-init can't
#     establish the thread-local Var binding `set!` requires, so the
#     `__init` <clinit> throws. Fix: `--initialize-at-run-time=
#     clojure.stacktrace__init` carves out that one namespace.
#     `next.jdbc.*` has the same pattern but works because its `__init`
#     classes are loaded later in the analysis order, after a binding
#     context has been established.
#
# Build-time-init allow-list:
#
#  - `clojure.lang.XMLHandler` — surfaces as a stray heap object
#    because somewhere in the static graph the class is referenced.
#    `InitClojureClasses` covers the `clojure` package directly but
#    NOT its `clojure.lang.*` subpackage, so we name the class.
#  - `com.brunobonacci.mulog` — mulog's macros expand to var refs
#    that need stable class identity at AOT time.
#  - `clojure.tools.logging` — pulled by mulog/slf4j bridge; safe.
#  - `org.slf4j` — resolves the binding once; saves a startup
#    classpath scan.
#  - `ch.qos.logback` — bake the logback config into the heap
#    snapshot. Without this its loader instantiates an `InfoStatus`
#    in the image heap and `--strict-image-heap` rejects the build.
#
# Run-time-init deny-list:
#
#  - `org.sqlite.JDBC` — calls `System.loadLibrary` lazily; must be
#    deferred.
#  - `clojure.stacktrace__init` — see obstacle 3 above.
#  - `clojure.test.check.random__init` — same `set! *unchecked-math*`
#    clinit pattern as `clojure.stacktrace__init`. Pulled in
#    transitively (likely malli generator support).
#  - `next.jdbc.sql__init` — same `set! *warn-on-reflection*`
#    pattern. Used to work via analysis-order luck (per the original
#    obstacle 3 note); after a clean rebuild it now fails
#    deterministically. Carved out explicitly.
#
# Other flags:
#  - `--no-fallback` — fail the build rather than fall back to a JVM
#    wrapper at runtime.
#  - `--enable-native-access=ALL-UNNAMED` — JDK 21 module system,
#    sqlite-jdbc + others need it.
#  - `--enable-url-protocols=http,https` — TLS + plaintext HTTP. The
#    Phase 2 design suggested dropping `http` after the clj-http
#    removal; left in because some local MCP servers use it.
#  - `-H:+ReportExceptionStackTraces` — keep traces on build errors.
#  - `-H:BuildOutputJSONFile` — feeds `bb size:ata` + CI. Experimental
#    on GraalVM 25; wrap with `-H:±UnlockExperimentalVMOptions`.
#  - `-march=compatibility` — portable binary. For host-local builds
#    consider `-march=native` (smaller, faster, host-specific).
#
# graal-build-time stays on the classpath — `InitClojureClasses` is
# now the active feature. Removing it from deps will silently
# disable build-time init for first-party Clojure namespaces.

Args = --features=clj_easy.graal_build_time.InitClojureClasses \
       --initialize-at-build-time=clojure.lang.XMLHandler \
       --initialize-at-build-time=com.brunobonacci.mulog \
       --initialize-at-build-time=clojure.tools.logging \
       --initialize-at-build-time=org.slf4j \
       --initialize-at-build-time=ch.qos.logback \
       --initialize-at-run-time=org.sqlite.JDBC \
       --initialize-at-run-time=clojure.stacktrace__init \
       --initialize-at-run-time=clojure.test.check.random__init \
       --initialize-at-run-time=next.jdbc.sql__init \
       --no-fallback \
       --enable-native-access=ALL-UNNAMED \
       --enable-url-protocols=http,https \
       -H:+ReportExceptionStackTraces \
       -H:+UnlockExperimentalVMOptions \
       -H:BuildOutputJSONFile=target/native-build.json \
       -H:-UnlockExperimentalVMOptions \
       -march=compatibility
